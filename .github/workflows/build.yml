name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test ./... -v

  build-windows:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build -o s3-rest-windows-amd64.exe ./cmd/server

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: s3-rest-windows-amd64
          path: s3-rest-windows-amd64.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o s3-rest-linux-amd64 ./cmd/server

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: s3-rest-linux-amd64
          path: s3-rest-linux-amd64

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: s3-rest-windows-amd64
          path: ./dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: s3-rest-linux-amd64
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./dist/s3-rest-windows-amd64.exe
            ./dist/s3-rest-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
